id: temporal_treatment_effects
name: Temporal treatment-effects (synthetic CATE prior with AR baseline)
version: 0.1.0
kind: temporal_causal
description: |
  Reference temporal-causal prior shipped with priorstudio. Same task shape
  as the prior the TCPFN v2.1 reference architecture trains against, ported
  to CPU so it runs in a plain `priorstudio run`. Generates synthetic
  treatment-effect data per task:

    1. Sample static covariates X ∈ R^(N × D), feature count D ~ U[3, 10].
    2. Sample AR(p) baseline dynamics (p ~ U[1, 5]) with unit-specific
       level + trend driven by X.
    3. Sample a treatment effect shape from
       {immediate, gradual, decay, permanent, delayed, oscillating} —
       this is the six-effect catalogue from v2.1.
    4. Assign treatment via a propensity model that depends on X
       (confounded by design).
    5. Build observed outcome Y as Y_cf0 or Y_cf1 according to assignment.
    6. Split N units into context / query and pack each timestep as a
       token with treatment + treatment-history + static covariates.

  Outputs ground-truth potential outcomes (E_y0_query, E_y1_query) so a
  causal-judgment head has supervision for both effect-direction and
  identifiability.

  Runs on CPU; the output dict is numpy at the wrapper boundary so the
  default training step can `torch.from_numpy(...)` each field.

parameters:
  min_T_pre:
    type: int
    default: 5
    description: Minimum pre-treatment timesteps per unit.
  max_T_pre:
    type: int
    default: 50
    description: Maximum pre-treatment timesteps per unit.
  min_T_post:
    type: int
    default: 3
    description: Minimum post-treatment timesteps per unit.
  max_T_post:
    type: int
    default: 30
    description: Maximum post-treatment timesteps per unit.
  min_features:
    type: int
    default: 3
    description: Minimum number of static covariate features per task.
  max_features:
    type: int
    default: 10
    description: Maximum number of static covariate features per task.
  max_num_features:
    type: int
    default: 100
    description: Width of the token feature axis (zero-padded beyond active features).
  noise_scale:
    type: float
    default: 0.3
    description: Std-dev of the per-timestep observation noise.
  confounding_strength:
    type: float
    default: 1.0
    description: Strength of the X → propensity link. 0 = unconfounded.
  treatment_history_len:
    type: int
    default: 3
    description: Lag length included in the per-token treatment-history features.
  n_context_units:
    type: int
    default: 10
    description: Number of context units per task.
  n_query_units:
    type: int
    default: 5
    description: Number of query units per task.

outputs:
  variables:
    - name: X_context
      type: tensor
      shape: "(n_ctx * T_total, max_num_features)"
      description: Per-timestep tokens for context units (treatment + history + covariates).
    - name: t_context
      type: tensor
      shape: "(n_ctx * T_total,)"
      description: Binary treatment assignment broadcast across timesteps for each context unit.
    - name: y_context
      type: tensor
      shape: "(n_ctx * T_total,)"
      description: Observed outcome for context units (Y_cf0 or Y_cf1 depending on assignment).
    - name: delta_t_context
      type: tensor
      shape: "(n_ctx * T_total,)"
      description: Relative timestep index (t - T_pre); negative pre, ≥0 post.
    - name: phase_context
      type: tensor
      shape: "(n_ctx * T_total,)"
      description: 0 pre-treatment, 1 post-treatment.
    - name: X_query
      type: tensor
      shape: "(n_qry * T_post, max_num_features)"
      description: Post-treatment query tokens — all with treatment = 1.
    - name: delta_t_query
      type: tensor
      shape: "(n_qry * T_post,)"
    - name: phase_query
      type: tensor
      shape: "(n_qry * T_post,)"
    - name: E_y0_query
      type: tensor
      shape: "(n_qry * T_post,)"
      description: Ground-truth control potential outcome at query positions.
    - name: E_y1_query
      type: tensor
      shape: "(n_qry * T_post,)"
      description: Ground-truth treated potential outcome at query positions.
    - name: elapsed_t_context
      type: tensor
      shape: "(n_ctx * T_total,)"
      description: Elapsed time since previous observation (always 1.0 for regular sampling).
    - name: elapsed_t_query
      type: tensor
      shape: "(n_qry * T_post,)"
    - name: metadata
      type: scalar
      description: T_pre, T_post, D, K, M, effect_type, treatment_type, has_missing_data (returned as a Python dict at sample time; declared scalar here because the prior schema doesn't have a dict primitive yet).

citations: []

implementation: prior.py
