# Workspace-level pyproject. The actual installable package lives at packages/cli.
# This top-level file exists so dev tools (ruff, mypy, pytest) can run from the repo root.

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["packages"]
