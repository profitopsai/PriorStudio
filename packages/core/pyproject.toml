[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "priorstudio-core"
version = "0.6.0"
description = "Core abstractions for PriorStudio — Prior, Model, Eval, Run, and the block registry."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "PriorStudio contributors" }]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  "pydantic>=2.6",
  "pyyaml>=6.0",
  "numpy>=1.26",
]

[project.optional-dependencies]
torch = ["torch>=2.2"]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[project.urls]
Homepage = "https://priorstudio.ai"
Repository = "https://github.com/profitopsai/priorstudio"
Issues = "https://github.com/profitopsai/priorstudio/issues"
Documentation = "https://github.com/profitopsai/priorstudio/tree/main/docs"

[tool.hatch.build.targets.wheel]
packages = ["priorstudio_core"]
