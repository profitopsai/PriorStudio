[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "priorstudio-studio"
version = "0.5.0"
description = "Static-site Studio for PriorStudio — renders an FM project as a browsable web UI."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "PriorStudio contributors" }]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
  "jinja2>=3.1",
  "markdown>=3.5",
  "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://priorstudio.ai"
Repository = "https://github.com/profitopsai/priorstudio"
Issues = "https://github.com/profitopsai/priorstudio/issues"
Documentation = "https://github.com/profitopsai/priorstudio/tree/main/docs"

[tool.hatch.build.targets.wheel]
packages = ["priorstudio_studio"]
artifacts = ["priorstudio_studio/templates/**/*", "priorstudio_studio/static/**/*"]
